
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recomeço | Sua Jornada</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Para estatísticas -->
</head>
<body class="theme-light">

    <!-- SplashScreen -->
    <div id="splash" class="active">
        <div class="logo-container">
            <h1 class="logo-text">Recomeço</h1>
            <p>Um dia de cada vez.</p>
        </div>
    </div>

    <!-- Header Fixo -->
    <header class="main-header">
        <div class="user-info">
            <div class="avatar" id="user-avatar">R</div>
            <div>
                <h2 id="welcome-msg">Bom dia!</h2>
                <small id="current-date"></small>
            </div>
        </div>
        <div class="level-badge">
            <span id="display-level">Nível 1</span>
            <div class="xp-mini-bar"><div id="xp-fill"></div></div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main id="app-router">
        <!-- As "views" serão injetadas aqui -->
    </main>

    <!-- Botão SOS Fixo -->
    <button id="sos-trigger" class="sos-fab" onclick="ui.render('sos')">SOS</button>

    <!-- Menu de Navegação -->
    <nav class="bottom-nav">
        <button onclick="ui.render('home')" class="nav-item">
            <i data-lucide="home"></i><span>Início</span>
        </button>
        <button onclick="ui.render('dashboard')" class="nav-item">
            <i data-lucide="layout-dashboard"></i><span>Estatísticas</span>
        </button>
        <button onclick="ui.render('journal')" class="nav-item">
            <i data-lucide="book-open"></i><span>Diário</span>
        </button>
        <button onclick="ui.render('habits')" class="nav-item">
            <i data-lucide="check-circle"></i><span>Hábitos</span>
        </button>
        <button onclick="ui.render('settings')" class="nav-item">
            <i data-lucide="settings"></i><span>Ajustes</span>
        </button>
    </nav>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/ui.js"></script>
    <script>
        window.addEventListener('load', () => {
            app.init();
            lucide.createIcons();
            setTimeout(() => document.getElementById('splash').classList.remove('active'), 1500);
        });
    </script>
</body>
</html>
